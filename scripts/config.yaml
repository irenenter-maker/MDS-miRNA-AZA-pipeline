    enrich_stem: "Enrichment_plot_miRTarBase_mature"
    xlsx: "plot_data_miRTarBase_mature.xlsx"

  miRWalk_GO_mature:
    gmt: "miRWalk_GO_mature.gmt"
    volcano_stem: "Volcano_plot_miRWalk_GO_mature"
